  description: During flights, M2 drones and Matternet Stations transmit real-time
    protobuf telemetry to the Matternet cloud over an MQTT broker (HiveMQ). This is
    an internal device-to-cloud telemetry transport, not a documented public
    subscribe API; no broker endpoint, topic schema, or credentials are published
    for third-party developers.
