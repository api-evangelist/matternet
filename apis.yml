    type: OpenAPI
  description: Operator-facing logistics surface for requesting deliveries and
    tracking payload chain-of-custody across hospital, laboratory, and pharmacy
    workflows. Matternet has referenced a secure medical drone delivery portal for
    hospitals, but no public integration API (e.g. LIS/EHR dispatch) is publicly
    documented. Integration is delivered through partner engagements.
