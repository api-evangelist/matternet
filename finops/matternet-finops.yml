description: >-
  FinOps view of engaging Matternet. Matternet does not bill a usage-metered
  public API; spend is structured as commercial / partner contracts for
  deploying and operating integrated drone-logistics networks (M2 aircraft,
  Matternet Station, and cloud Software Platform) for healthcare and logistics
  customers. There is no published per-call, per-token, or per-message rate
  card, so cost allocation is contract- and delivery-based rather than
  API-usage-based. Values below are not reconciled against any published
  pricing.
notes: >-
  No public pricing or billing API exists for Matternet. Cost dimensions are
  inferred from the commercial engagement model (per-delivery, per-network,
  per-contract) and should be confirmed directly with Matternet during
  reconciliation.
