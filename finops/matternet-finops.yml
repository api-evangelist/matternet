meters:
- name: deliveries
  description: Completed drone deliveries / flights, the operational unit of a Matternet network. Pricing is contract-based, not publicly metered.
  unit: deliveries
  aggregation: sum
  dimensions:
  - customer
  - network
- name: network_operations
  description: Operation of a deployed Matternet network (aircraft, Stations, platform) under a commercial agreement.
  unit: networks
  aggregation: sum
  dimensions:
  - customer
principles:
- name: Visibility
  description: No usage/billing export API is published; obtain delivery and operations reporting directly from Matternet under the engagement.
- name: Allocation
  description: Map Matternet contract costs to the healthcare/logistics program or facility consuming the drone-delivery service.
- name: Optimization
  description: Optimize at the route/network design and delivery-volume level with Matternet; there are no per-call API levers to tune.
- name: Accountability
  description: Assign an owner for the Matternet commercial relationship and review delivery volume against the contract.
