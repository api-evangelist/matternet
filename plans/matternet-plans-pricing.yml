description: >-
  Matternet does not offer a self-serve, publicly priced API or platform.
  Matternet sells and operates integrated drone-logistics networks (M2
  aircraft, Matternet Station, and the cloud Software Platform) through
  commercial and partner engagements for healthcare systems and logistics
  organizations. Pricing is delivery- and contract-based and is negotiated
  directly with Matternet sales; no public per-call API pricing or developer
  tiers are published.
notes: >-
  No public pricing page exists for a Matternet developer API. The single
  plan below is a placeholder for commercial/partner engagement and is not
  reconciled against any published rate card. Contact Matternet for terms.
sources:
- https://www.matternet.com/
- https://www.matternet.com/our-system-software-platform
